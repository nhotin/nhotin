<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <defs>
    <!-- Sky gradient: pastel green-blue -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F5EC"/>
      <stop offset="50%" stop-color="#D4E8E1"/>
      <stop offset="100%" stop-color="#B5D8EB"/>
    </linearGradient>
    <!-- Cloud soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="1200" height="280" fill="url(#sky)"/>

  <!-- Sun glow -->
  <circle cx="950" cy="60" r="35" fill="#FFE5A7" opacity="0.7"/>
  <circle cx="950" cy="60" r="25" fill="#FFF4D4" opacity="0.9"/>

  <!-- Background clouds (smaller, far) -->
  <g fill="#FFFFFF" opacity="0.55">
    <ellipse cx="200" cy="50" rx="40" ry="14"/>
    <ellipse cx="230" cy="45" rx="30" ry="12"/>
    <ellipse cx="180" cy="48" rx="25" ry="10"/>

    <ellipse cx="780" cy="40" rx="45" ry="15"/>
    <ellipse cx="810" cy="35" rx="32" ry="12"/>

    <ellipse cx="500" cy="35" rx="38" ry="13"/>
    <ellipse cx="525" cy="30" rx="28" ry="11"/>
  </g>

  <!-- Mid clouds -->
  <g fill="#FFFFFF" opacity="0.85" filter="url(#softShadow)">
    <!-- Cloud 1 (left) -->
    <ellipse cx="120" cy="130" rx="60" ry="22"/>
    <ellipse cx="160" cy="118" rx="48" ry="22"/>
    <ellipse cx="90" cy="125" rx="38" ry="18"/>
    <ellipse cx="180" cy="135" rx="35" ry="16"/>

    <!-- Cloud 2 (center-left) -->
    <ellipse cx="380" cy="100" rx="55" ry="20"/>
    <ellipse cx="420" cy="92" rx="42" ry="20"/>
    <ellipse cx="350" cy="105" rx="32" ry="15"/>
  </g>

  <!-- Foreground clouds (bigger, closer) -->
  <g fill="#FFFFFF" filter="url(#softShadow)">
    <!-- Big cloud right -->
    <ellipse cx="650" cy="160" rx="75" ry="28"/>
    <ellipse cx="700" cy="148" rx="60" ry="28"/>
    <ellipse cx="610" cy="155" rx="45" ry="22"/>
    <ellipse cx="730" cy="165" rx="40" ry="20"/>

    <!-- Big cloud far right -->
    <ellipse cx="1020" cy="180" rx="80" ry="30"/>
    <ellipse cx="1075" cy="168" rx="62" ry="28"/>
    <ellipse cx="975" cy="175" rx="48" ry="22"/>
    <ellipse cx="1110" cy="185" rx="42" ry="20"/>
  </g>

  <!-- Floating accent dots (sparkle) -->
  <g fill="#A7E8BD" opacity="0.7">
    <circle cx="280" cy="200" r="3"/>
    <circle cx="450" cy="220" r="2.5"/>
    <circle cx="850" cy="80" r="3"/>
    <circle cx="600" cy="240" r="2.5"/>
  </g>
  <g fill="#B5D8EB" opacity="0.8">
    <circle cx="320" cy="170" r="2.5"/>
    <circle cx="900" cy="220" r="3"/>
    <circle cx="550" cy="200" r="2"/>
  </g>

  <!-- Subtle wave at bottom (transition to README) -->
  <path d="M0,260 Q300,240 600,255 T1200,255 L1200,280 L0,280 Z" fill="#FFFFFF" opacity="0.4"/>
  <path d="M0,270 Q300,255 600,265 T1200,265 L1200,280 L0,280 Z" fill="#FFFFFF" opacity="0.6"/>
</svg>
