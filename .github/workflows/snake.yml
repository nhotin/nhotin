name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: nhotin
          outputs: |
            dist/snake.svg?color_snake=A7E8BD&color_dots=E8F5EC,C8E6D0,A7E8BD,8FBC8F,5C9A6F
            dist/snake-dark.svg?color_snake=A7E8BD&color_dots=1F2937,2D5F3F,5C9A6F,A7E8BD,B5D8EB

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}