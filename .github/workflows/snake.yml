name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: nhotin
          outputs: |
            dist/snake.svg?color_snake=A7E8BD&color_dots=F0FDF4,DCFCE7,BBF7D0,86EFAC,4ADE80
            dist/snake-dark.svg?color_snake=A7E8BD&color_dots=161B22,065F46,059669,10B981,A7E8BD

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}