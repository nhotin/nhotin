name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: nhotin
          outputs: |
            dist/snake.svg?color_snake=A7E8BD&color_dots=ebedf0,c6e48b,7bc96f,239a3b,196127
            dist/snake-dark.svg?color_snake=A7E8BD&color_dots=161b22,0e4429,006d32,26a641,39d353

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}